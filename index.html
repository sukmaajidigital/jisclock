<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JisClock</title>
    <meta
      name="description"
      content="JisClock adalah jam analog 24 jam dengan jam digital, tanggal, hari, zona waktu, dan dukungan install ke layar utama HP (PWA)."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JisClock" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JisClock" />
    <meta
      property="og:description"
      content="Jam analog 24 jam modern dengan jam digital, hari, tanggal, dan zona waktu."
    />
    <meta property="og:locale" content="id_ID" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JisClock" />
    <meta
      name="twitter:description"
      content="Jam analog 24 jam modern dengan jam digital, hari, tanggal, dan zona waktu."
    />
    <link rel="manifest" href="manifest.webmanifest?v=3" />
    <link rel="canonical" href="./" />
    <link id="apple-touch-icon" rel="apple-touch-icon" href="icons/icon-192.svg?v=2" />
    <link id="favicon" rel="icon" type="image/png" href="" />
    <style>
      /* Variabel Tema Terang (Light Mode) */
      :root {
        --bg-color: #f8fafc;
        --clock-bg: #ffffff;
        --clock-border: #e2e8f0;
        --text-color: #334155;
        --hand-hour: #0f172a;
        --hand-min: #64748b;
        --hand-sec: #e11d48;
        --hand-ms: #3b82f6;
        --dot-color: #0f172a;
      }

      /* Variabel Tema Gelap (Dark Mode) */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0f172a;
          --clock-bg: #1e293b;
          --clock-border: #334155;
          --text-color: #f8fafc;
          --hand-hour: #f8fafc;
          --hand-min: #94a3b8;
          --hand-sec: #fb7185;
          --hand-ms: #60a5fa;
          --dot-color: #f8fafc;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        transition:
          background-color 0.4s ease,
          color 0.4s ease;
      }

      /* Desain Responsif Jam */
      .clock-container {
        position: relative;
        width: 82vmin;
        height: 82vmin;
        max-width: 500px;
        max-height: 500px;
        background-color: var(--clock-bg);
        border: 8px solid var(--clock-border);
        border-radius: 60%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        transition:
          background-color 0.4s ease,
          border-color 0.4s ease;
      }

      .numbers {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 9;
      }

      .radar-layer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        pointer-events: none;
        z-index: 7;
      }

      .number {
        position: absolute;
        width: 28px;
        height: 28px;
        margin: -14px 0 0 -14px; /* Pusatkan titik kordinat */
        text-align: center;
        line-height: 28px;
        font-weight: 600;
        font-size: 1rem;
      }

      /* Styling Jarum Jam */
      .hand {
        position: absolute;
        bottom: 50%;
        left: 50%;
        transform-origin: bottom center;
        border-radius: 10px;
        z-index: 10;
      }

      .hour-hand {
        width: 6px;
        height: 25%;
        background-color: var(--hand-hour);
        margin-left: -3px;
      }

      .minute-hand {
        width: 4px;
        height: 35%;
        background-color: var(--hand-min);
        margin-left: -2px;
      }

      .second-hand {
        width: 2px;
        height: 42%;
        background-color: var(--hand-sec);
        margin-left: -1px;
        z-index: 11;
      }

      .ms-hand {
        width: 1px;
        height: 46%;
        background-color: var(--hand-ms);
        margin-left: -0.5px;
        z-index: 12;
        opacity: 0.7;
      }

      .center-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        background-color: var(--dot-color);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 15;
      }
      .digital-clock {
        margin-top: 2.5rem;
        margin-bottom: 0;
        text-align: center;
        font-size: 1.2rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--text-color);
        border-radius: 0.75rem;
        padding: 0.7rem 1.2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        display: block;
        user-select: none;
        transition: background 0.4s;
        width: auto;
        max-width: 100vw;
      }
    </style>
  </head>
  <body>
    <div class="clock-container">
      <div class="numbers" id="numbers"></div>
      <canvas id="radar-layer" class="radar-layer"></canvas>
      <div class="hand hour-hand" id="hour"></div>
      <div class="hand minute-hand" id="minute"></div>
      <div class="hand second-hand" id="second"></div>
      <div class="hand ms-hand" id="ms"></div>
      <div class="center-dot"></div>
    </div>

    <div id="digital-clock" class="digital-clock"></div>

    <script>
      // 1. GENERATE ANGKA 24 JAM
      const numbersContainer = document.getElementById("numbers");
      const clockContainer = document.querySelector(".clock-container");
      const radarCanvas = document.getElementById("radar-layer");
      const radarCtx = radarCanvas.getContext("2d");
      const numberElements = [];

      function hexToRgba(hex, alpha) {
        const clean = hex.trim().replace("#", "");
        if (clean.length !== 6) {
          return `rgba(59,130,246,${alpha})`;
        }

        const r = parseInt(clean.slice(0, 2), 16);
        const g = parseInt(clean.slice(2, 4), 16);
        const b = parseInt(clean.slice(4, 6), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function resizeRadarCanvas() {
        const size = Math.max(1, Math.floor(clockContainer.clientWidth));
        const dpr = window.devicePixelRatio || 1;

        radarCanvas.width = Math.floor(size * dpr);
        radarCanvas.height = Math.floor(size * dpr);
        radarCanvas.style.width = `${size}px`;
        radarCanvas.style.height = `${size}px`;
        radarCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        radarCtx.clearRect(0, 0, size, size);
      }

      function drawMsRadarTrail(msAngle) {
        const size = clockContainer.clientWidth;
        const center = size / 2;
        const radius = size * 0.42;
        const msColor =
          getComputedStyle(document.documentElement).getPropertyValue("--hand-ms") || "#3b82f6";
        const bgColor =
          getComputedStyle(document.documentElement).getPropertyValue("--clock-bg") || "#ffffff";

        // Pudar perlahan agar jejak terlihat seperti sweep radar.
        radarCtx.fillStyle = hexToRgba(bgColor, 0.07);
        radarCtx.fillRect(0, 0, size, size);

        for (let i = 0; i < 12; i++) {
          const trailAngle = msAngle - i * 2.4;
          const rad = trailAngle * (Math.PI / 180);
          const x = center + Math.sin(rad) * radius;
          const y = center - Math.cos(rad) * radius;
          const alpha = (1 - i / 12) ** 1.7 * 0.65;

          radarCtx.beginPath();
          radarCtx.moveTo(center, center);
          radarCtx.lineTo(x, y);
          radarCtx.strokeStyle = hexToRgba(msColor, alpha);
          radarCtx.lineWidth = Math.max(1, size * 0.006);
          radarCtx.lineCap = "round";
          radarCtx.stroke();
        }
      }

      for (let i = 1; i <= 24; i++) {
        const num = document.createElement("div");
        num.className = "number";
        num.innerText = i;
        numberElements.push(num);
        numbersContainer.appendChild(num);
      }

      function layoutClockNumbers() {
        const clockSize = clockContainer.clientWidth;
        const numberSize = Math.max(18, Math.min(34, clockSize * 0.085));
        const fontSize = Math.max(11, numberSize * 0.48);
        const radiusPx = clockSize / 2 - numberSize * 0.95 - 8;

        resizeRadarCanvas();

        numberElements.forEach((num, index) => {
          const value = index + 1;

          // Kalkulasi posisi X dan Y menggunakan trigonometri
          // 360 derajat / 24 jam = 15 derajat per jam
          const angle = value * 15 * (Math.PI / 180);
          const x = Math.sin(angle) * radiusPx;
          const y = -Math.cos(angle) * radiusPx;

          num.style.width = `${numberSize}px`;
          num.style.height = `${numberSize}px`;
          num.style.marginLeft = `-${numberSize / 2}px`;
          num.style.marginTop = `-${numberSize / 2}px`;
          num.style.lineHeight = `${numberSize}px`;
          num.style.fontSize = `${fontSize}px`;
          num.style.left = `calc(50% + ${x}px)`;
          num.style.top = `calc(50% + ${y}px)`;
        });
      }

      layoutClockNumbers();
      window.addEventListener("resize", layoutClockNumbers);
      window.addEventListener("orientationchange", layoutClockNumbers);

      // 2. LOGIKA ANIMASI & FAVICON
      const hourHand = document.getElementById("hour");
      const minHand = document.getElementById("minute");
      const secHand = document.getElementById("second");
      const msHand = document.getElementById("ms");
      const favicon = document.getElementById("favicon");
      const appleTouchIcon = document.getElementById("apple-touch-icon");

      // Setup Canvas untuk Favicon
      const canvas = document.createElement("canvas");
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext("2d");
      let lastFaviconUpdate = 0;
      let lastBadgeValue = null;

      function updateFavicon(hourAngle, minAngle) {
        ctx.clearRect(0, 0, 64, 64);
        const isDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

        // Background Favicon
        ctx.beginPath();
        ctx.arc(32, 32, 30, 0, 2 * Math.PI);
        ctx.fillStyle = isDark ? "#1e293b" : "#ffffff";
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = isDark ? "#334155" : "#e2e8f0";
        ctx.stroke();

        // Jarum Jam Favicon
        ctx.save();
        ctx.translate(32, 32);
        ctx.rotate(hourAngle * (Math.PI / 180));
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -12);
        ctx.lineWidth = 4;
        ctx.strokeStyle = isDark ? "#f8fafc" : "#0f172a";
        ctx.stroke();
        ctx.restore();

        // Jarum Menit Favicon
        ctx.save();
        ctx.translate(32, 32);
        ctx.rotate(minAngle * (Math.PI / 180));
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -22);
        ctx.lineWidth = 2;
        ctx.strokeStyle = isDark ? "#94a3b8" : "#64748b";
        ctx.stroke();
        ctx.restore();

        favicon.href = canvas.toDataURL("image/png");

        // Sinkronkan ikon sentuh untuk mobile browser (best effort).
        // Sebagian OS menyimpan cache ikon app saat install, jadi perubahan tidak selalu instan.
        if (appleTouchIcon) {
          appleTouchIcon.href = canvas.toDataURL("image/png");
        }
      }

      function setDynamicTitle(hour, min) {
        // Format 2 digit
        const pad = (n) => n.toString().padStart(2, "0");
        document.title = `Jam ${pad(hour)}:${pad(min)} - JisClock`;
      }

      function updateAppBadge(hour, min) {
        // Menampilkan HHMM sebagai badge di launcher app jika API didukung browser.
        if (!("setAppBadge" in navigator)) {
          return;
        }

        const badgeValue = hour * 100 + min;
        if (badgeValue === lastBadgeValue) {
          return;
        }

        navigator.setAppBadge(badgeValue).catch(() => {
          // Abaikan jika badge tidak didukung penuh oleh OS/perangkat.
        });
        lastBadgeValue = badgeValue;
      }

      function animateClock() {
        function updateDigitalClock() {
          const now = new Date();
          // Hari dalam bahasa Indonesia
          const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
          // Format tanggal: DD Month YYYY
          const bulan = [
            "Januari",
            "Februari",
            "Maret",
            "April",
            "Mei",
            "Juni",
            "Juli",
            "Agustus",
            "September",
            "Oktober",
            "November",
            "Desember",
          ];
          const dayName = hari[now.getDay()];
          const date = now.getDate();
          const month = bulan[now.getMonth()];
          const year = now.getFullYear();
          // Jam digital 2 digit
          const pad = (n) => n.toString().padStart(2, "0");
          const jam = pad(now.getHours());
          const menit = pad(now.getMinutes());
          const detik = pad(now.getSeconds());
          // Zona waktu lokal
          const tz = Intl.DateTimeFormat().resolvedOptions().timeZone.replace("_", " ");
          // Format string
          const str = `${dayName}, ${date} ${month} ${year} — <span style="font-variant-numeric:tabular-nums">${jam}:${menit}:${detik}</span> <span style="font-size:1rem;font-weight:400">(${tz})</span>`;
          document.getElementById("digital-clock").innerHTML = str;
        }
        const now = new Date();
        const ms = now.getMilliseconds();
        const sec = now.getSeconds();
        const min = now.getMinutes();
        const hour = now.getHours();

        // Kalkulasi Rotasi
        const msAngle = (ms / 1000) * 360;
        // Detik: loncat tiap detik (tidak smooth)
        const secAngle = (sec / 60) * 360;
        const minAngle = (min / 60) * 360 + (sec / 60) * 6;
        // Format 24 Jam: 360 derajat / 24 = 15 derajat per jam
        const hourAngle = (hour / 24) * 360 + (min / 60) * 15;

        // Terapkan Rotasi
        msHand.style.transform = `rotate(${msAngle}deg)`;
        secHand.style.transform = `rotate(${secAngle}deg)`;
        minHand.style.transform = `rotate(${minAngle}deg)`;
        hourHand.style.transform = `rotate(${hourAngle}deg)`;
        drawMsRadarTrail(msAngle);

        // Update Favicon (Dibatasi 1 detik sekali agar tidak membebani memori browser)
        if (now.getTime() - lastFaviconUpdate > 1000) {
          updateFavicon(hourAngle, minAngle);
          lastFaviconUpdate = now.getTime();
        }

        setDynamicTitle(hour, min);
        updateAppBadge(hour, min);
        updateDigitalClock();
        requestAnimationFrame(animateClock);
      }

      // Mulai Animasi
      requestAnimationFrame(animateClock);

      // Daftarkan Service Worker agar memenuhi syarat install PWA.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js?v=3").catch(() => {
            // Abaikan error register agar jam utama tetap berjalan.
          });
        });
      }
    </script>
  </body>
</html>
