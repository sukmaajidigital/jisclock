  <line x1="460" y1="360" x2="560" y2="360" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
  <circle cx="460" cy="360" r="10" fill="#fb7185"/>
  <rect x="740" y="280" rx="16" ry="16" width="380" height="160" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="340" fill="#0f172a" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">JisClock</text>
  <text x="770" y="390" fill="#334155" font-size="30" font-family="Segoe UI, Arial, sans-serif">Jam Analog 24 Jam</text>
